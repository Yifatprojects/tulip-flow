<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=6" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png?v=6" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=6" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TULIP Flow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Montserrat:wght@200;300;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        var SNAPSHOT_KEY = 'tulip_auth_recovery_snapshot';
        var combined = location.search + location.hash;
        var hasAuthParams =
          /(?:^|[?&#])code=/.test(combined) ||
          /access_token=/.test(combined) ||
          /token_hash=/.test(combined) ||
          /type=recovery/.test(combined) ||
          /(?:^|[?&#])error=/.test(combined);
        if (hasAuthParams) {
          try {
            sessionStorage.setItem(
              SNAPSHOT_KEY,
              JSON.stringify({
                search: location.search || '',
                hash: location.hash || '',
                at: Date.now(),
              }),
            );
          } catch (e) {}
        }
        var path = location.pathname;
        var onReset = path === '/reset-password' || path.endsWith('/reset-password');
        if (!onReset && hasAuthParams) {
          location.replace(location.origin + '/reset-password' + location.search + location.hash);
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
